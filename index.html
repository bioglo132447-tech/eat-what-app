<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理排盤：紅帖八字查詢</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        :root { --gold: #f5e0a3; --deep-red: #8b0000; --card-red: #a52a2a; --accent-gold: #ffd700; --text-dark: #3e0a0a; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", serif; background: var(--deep-red); color: var(--gold); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 500px; background: var(--card-red); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 3px double var(--accent-gold); box-sizing: border-box; }
        h1 { text-align: center; color: var(--accent-gold); font-size: 1.6rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid var(--accent-gold); background: #fff8e1; color: var(--text-dark); box-sizing: border-box; font-size: 1.1rem; font-weight: bold; }
        button { width: 100%; padding: 16px; background: var(--accent-gold); border: 2px solid var(--deep-red); border-radius: 12px; color: var(--deep-red); font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .result-box { margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid var(--accent-gold); line-height: 1.9; display: none; }
        #lunarDate { font-size: 1.3rem; font-weight: 900; color: #fff; text-align: center; margin-bottom: 15px; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; margin: 20px 0; border: 2px solid var(--accent-gold); background: var(--deep-red); }
        .bazi-item { padding: 12px; border: 1px solid var(--accent-gold); }
        .bazi-label { color: var(--accent-gold); font-size: 0.9rem; font-weight: bold; }
        .bazi-content { font-size: 1.2rem; font-weight: 900; color: #fff; margin-top: 5px; }
        .info-text { margin-top: 10px; border-top: 1px solid rgba(255,235,59,0.3); padding-top: 10px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📜 開運紅帖：八字查詢</h1>
    <div class="input-group">
        <label>國曆生日 (YYYYMMDD)</label>
        <input type="number" id="birthDate" placeholder="例如 19990401">
    </div>
    <div class="input-group">
        <label>出生時間 (HHMM)</label>
        <input type="number" id="birthTime" placeholder="例如 1155">
    </div>
    <button onclick="calculate()">即刻排盤 • 窺探天機</button>

    <div id="result" class="result-box">
        <div id="lunarDate"></div>
        <div class="bazi-grid">
            <div class="bazi-item"><div class="bazi-label">年柱</div><div id="yearGZ" class="bazi-content"></div></div>
            <div class="bazi-item"><div class="bazi-label">月柱</div><div id="monthGZ" class="bazi-content"></div></div>
            <div class="bazi-item"><div class="bazi-label">日柱</div><div id="dayGZ" class="bazi-content"></div></div>
            <div class="bazi-item"><div class="bazi-label">時柱</div><div id="hourGZ" class="bazi-content"></div></div>
        </div>
        <div class="info-text">生肖屬相：<span id="zodiac" style="color:#ffeb3b; font-weight:bold;"></span></div>
        <div id="shouSheng" class="info-text"></div>
        <div id="starLord" class="info-text"></div>
    </div>
</div>

<script>
function calculate() {
    // 防呆：檢查工具庫是否成功加載
    if (typeof Solar === 'undefined') {
        alert("系統工具庫載入失敗，請檢查網路或重新整理頁面！");
        return;
    }

    const dVal = document.getElementById('birthDate').value;
    const tVal = document.getElementById('birthTime').value || "0000";

    if (dVal.length !== 8) { alert("日期格式需為8位數字"); return; }

    const y = parseInt(dVal.substring(0, 4));
    const m = parseInt(dVal.substring(4, 6));
    const d = parseInt(dVal.substring(6, 8));
    const h = parseInt(tVal.substring(0, 2));
    const min = parseInt(tVal.substring(2, 4));

    try {
        const solar = Solar.fromYmdHms(y, m, d, h, min, 0);
        const lunar = solar.getLunar();
        const eightChar = lunar.getEightChar();

        document.getElementById('result').style.display = 'block';
        document.getElementById('lunarDate').innerText = `農曆：${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
        document.getElementById('zodiac').innerText = `${lunar.getYearShengXiao()} (${lunar.getYearShengXiaoByGanzhi()})`;
        
        document.getElementById('yearGZ').innerText = eightChar.getYear();
        document.getElementById('monthGZ').innerText = eightChar.getMonth();
        document.getElementById('dayGZ').innerText = eightChar.getDay();
        document.getElementById('hourGZ').innerText = eightChar.getTime();

        const ssMap = { "甲":"三萬三千貫","乙":"四萬貫","丙":"三萬八千貫","丁":"七萬貫","戊":"五萬四千貫","己":"九萬貫","庚":"五萬En貫","辛":"三萬二千貫","壬":"七萬二千貫","癸":"五萬貫" };
        document.getElementById('shouSheng').innerHTML = `<b>受生錢：</b>${ssMap[eightChar.getYear().substring(0,1)] || "查無資料"}`;
        
        const starMap = { "子":"貪狼","丑":"巨門","寅":"祿存","卯":"文曲","辰":"廉貞","巳":"武曲","午":"破軍","未":"貪狼","申":"巨門","酉":"祿存","戌":"文曲","亥":"廉貞" };
        document.getElementById('starLord').innerHTML = `<b>本命星君：</b>${starMap[eightChar.getYear().substring(1,2)] || "查無資料"}`;
    } catch (e) {
        alert("日期輸入錯誤，請確認！");
    }
}
</script>
</body>
</html>
